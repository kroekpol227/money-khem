<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบสรุปเงินอัตโนมัติ</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    margin:0;
}

.container{
    max-width:1000px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    text-align:center;
}

/* กล่องรูป + ป้าย */
.creditor-box{
    position:relative;
    display:inline-block;
    margin:20px 0;
}

.creditor-label{
    position:absolute;
    top:-30px;
    left:-20px;
    font-size:22px;
    font-weight:bold;
    color:red;
}

/* รูปเจ้าหนี้ */
.creditor-img{
    width:350px;
    max-width:100%;
    display:block;
}

/* ลูกศร */
.arrow{
    position:absolute;
    top:5px;
    left:60px;
    font-size:30px;
    color:red;
}

textarea{
    width:100%;
    height:250px;
    padding:15px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:14px;
    text-align:left;
}

button{
    margin-top:15px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#0077ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#005fd1;
}

.result{
    margin-top:25px;
    padding:20px;
    background:#f4f8ff;
    border-radius:10px;
    font-weight:bold;
    text-align:left;
}

.green{color:green;}
.red{color:red;}
</style>
</head>

<body>

<div class="container">
<h1>💑 ระบบคำนวณเงินอัตโนมัติ</h1>

<div class="creditor-box">
    <div class="creditor-label">เจ้าหนี้</div>
    <div class="arrow"></div>
    <img src="1.jpeg" 
         alt="เจ้าหนี้"
         class="creditor-img">
</div>

<textarea id="inputData" placeholder="วางข้อมูลตรงนี้..."></textarea>

<button onclick="calculate()">คำนวณ</button>

<div class="result" id="result"></div>
</div>

<script>
function calculate(){
    const text = document.getElementById("inputData").value;
    const lines = text.split("\n");

    let borrowTotal = 0;
    let returnTotal = 0;
    let expenseTotal = 0;

    lines.forEach(line=>{
        line = line.trim();
        if(line==="") return;

        const numberMatch = line.match(/\d+/);
        if(!numberMatch) return;

        const amount = parseFloat(numberMatch[0]);

        if(line.includes("คืน")){
            returnTotal += amount;
        }
        else if(line.includes("ยืม")){
            borrowTotal += amount;
        }
        else{
            expenseTotal += amount;
        }
    });

    const balance = borrowTotal - returnTotal;

    let summary = `
    💸 รายจ่ายทั้งหมด: ${expenseTotal.toLocaleString()} บาท <br><br>
    💵 คืนทั้งหมด: ${returnTotal.toLocaleString()} บาท <br><br>
    `;

    if(balance > 0){
        summary += `<span class="red">คุณยังติดอยู่ ${balance.toLocaleString()} บาท</span>`;
    }else if(balance < 0){
        summary += `<span class="green">เกินมา ${Math.abs(balance).toLocaleString()} บาท</span>`;
    }else{
        summary += `<span class="green">มีแล้วจะคืนให้ครบ </span>`;
    }

    document.getElementById("result").innerHTML = summary;
}
</script>

</body>
</html>
