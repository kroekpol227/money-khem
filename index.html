<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบสรุปเงินอัตโนมัติ</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background: radial-gradient(circle at center, #ff0000 0%, #8b0000 40%, #000000 100%);
    color:white;
    animation: fireBG 3s infinite alternate;
}

/* เอฟเฟกต์ไฟกระพริบ */
@keyframes fireBG{
    from { filter: brightness(1); }
    to { filter: brightness(1.2); }
}

.container{
    max-width:1000px;
    margin:40px auto;
    background:rgba(0,0,0,0.85);
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 40px red;
    text-align:center;
}

h1{
    text-align:center;
    color:#ff4444;
    text-shadow:0 0 15px red;
}

/* เจ้าหนี้ */
.creditor-box{
    position:relative;
    display:inline-block;
    margin:20px 0;
}

.creditor-label{
    position:absolute;
    top:-30px;
    left:-20px;
    font-size:22px;
    font-weight:bold;
    color:#ff0000;
    text-shadow:0 0 10px red;
}

.creditor-img{
    width:350px;
    max-width:100%;
    display:block;
    border:3px solid red;
    box-shadow:0 0 25px red;
}

/* textarea */
textarea{
    width:100%;
    height:250px;
    padding:15px;
    border-radius:10px;
    border:2px solid red;
    background:#111;
    color:white;
    font-size:14px;
}

/* ปุ่มไฟ */
button{
    margin-top:15px;
    padding:15px;
    width:100%;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#ff0000,#ff6600);
    color:white;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 0 20px red;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 40px #ff0000;
}

/* ผลลัพธ์ */
.result{
    margin-top:25px;
    padding:20px;
    background:#111;
    border-radius:10px;
    font-weight:bold;
    border:2px solid red;
    box-shadow:0 0 20px red;
}

.green{color:#00ff99;}
.red{color:#ff3333; text-shadow:0 0 10px red;}
</style>
</head>

<body>

<div class="container">
<h1>🔥 ระบบทวงหนี้ไฟนรก 🔥</h1>

<div class="creditor-box">
    <div class="creditor-label">เจ้าหนี้โหด</div>
    <img src="1.jpeg" alt="เจ้าหนี้" class="creditor-img">
</div>

<textarea id="inputData" placeholder="วางข้อมูลตรงนี้..."></textarea>

<button onclick="calculate()">🔥 คำนวณด่วน 🔥</button>

<div class="result" id="result"></div>
</div>

<script>
function calculate(){
    const text = document.getElementById("inputData").value;
    const lines = text.split("\n");

    let borrowTotal = 0;
    let returnTotal = 0;
    let expenseTotal = 0;

    lines.forEach(line=>{
        line = line.trim();
        if(line==="") return;

        const numberMatch = line.match(/\d+/);
        if(!numberMatch) return;

        const amount = parseFloat(numberMatch[0]);

        if(line.includes("คืน")){
            returnTotal += amount;
        }
        else if(line.includes("ยืม")){
            borrowTotal += amount;
        }
        else{
            expenseTotal += amount;
        }
    });

    const balance = borrowTotal - returnTotal;

    let summary = `
    💸 รายจ่ายทั้งหมด: ${expenseTotal.toLocaleString()} บาท <br><br>
    💵 คืนทั้งหมด: ${returnTotal.toLocaleString()} บาท <br><br>
    `;

    if(balance > 0){
        summary += `<span class="red">🔥 ยังติดหนี้ ${balance.toLocaleString()} บาท รีบจ่ายด่วน! 🔥</span>`;
    }else if(balance < 0){
        summary += `<span class="green">😎 เกินมา ${Math.abs(balance).toLocaleString()} บาท รอดตัวไป!</span>`;
    }else{
        summary += `<span class="green">⚖️ เสมอกัน แต่ยังไม่พ้นกรรม 😈</span>`;
    }

    document.getElementById("result").innerHTML = summary;
}
</script>

</body>
</html>
